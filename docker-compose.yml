version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: veilsec_postgres
    environment:
      POSTGRES_USER: veilsec
      POSTGRES_PASSWORD: veilsec
      POSTGRES_DB: veilsec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veilsec"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - veilsec_network

  redis:
    image: redis:7-alpine
    container_name: veilsec_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - veilsec_network

  minio:
    image: minio/minio:latest
    container_name: veilsec_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: veilsec
      MINIO_ROOT_PASSWORD: veilsec123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veilsec_network

  minio_setup:
    image: minio/mc:latest
    container_name: veilsec_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 veilsec veilsec123;
      mc mb --ignore-existing local/veilsec-local;
      mc anonymous set none local/veilsec-local;
      echo 'Bucket criado.';
      "
    networks:
      - veilsec_network

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api/Dockerfile
    container_name: veilsec_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://veilsec:veilsec@postgres:5432/veilsec
      REDIS_URL: redis://redis:6379/0
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_S3_BUCKET: veilsec-local
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veilsec_network

  worker_sast:
    build:
      context: .
      dockerfile: infrastructure/docker/worker_sast/Dockerfile
    container_name: veilsec_worker_sast
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://veilsec:veilsec@postgres:5432/veilsec
      REDIS_URL: redis://redis:6379/0
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_S3_BUCKET: veilsec-local
      AI_CLASSIFIER_MODE: mock
      ENVIRONMENT: development
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A apps.worker_sast.worker worker
      --loglevel=info
      --queues=sast
      --concurrency=2
    networks:
      - veilsec_network

  worker_dast:
    build:
      context: .
      dockerfile: infrastructure/docker/worker_dast/Dockerfile
    container_name: veilsec_worker_dast
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://veilsec:veilsec@postgres:5432/veilsec
      REDIS_URL: redis://redis:6379/0
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_S3_BUCKET: veilsec-local
      ENVIRONMENT: development
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A apps.worker_dast.worker worker
      --loglevel=info
      --queues=dast
      --concurrency=1
    networks:
      - veilsec_network

  flower:
    build:
      context: .
      dockerfile: infrastructure/docker/worker_sast/Dockerfile
    container_name: veilsec_flower
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A apps.worker_sast.worker flower
      --port=5555
      --broker=redis://redis:6379/0
    networks:
      - veilsec_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  veilsec_network:
    driver: bridge
